<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="16" fill="%2307111e"/%3E%3Cpath d="M18 21h28v6H25v8h18v6H25v13h-7V21z" fill="%2322d3ee"/%3E%3C/svg%3E'
    />
    <title>Focus Agent</title>
    <script>
      (() => {
        const html = document.documentElement;
        const readStoredValue = (key, allowedValues, fallback) => {
          try {
            const storedValue = window.localStorage.getItem(key);
            return allowedValues.includes(storedValue) ? storedValue : fallback;
          } catch {
            return fallback;
          }
        };

        const queryLanguage = new URLSearchParams(window.location.search).get("lang");
        const language = ["en", "zh"].includes(queryLanguage)
          ? queryLanguage
          : readStoredValue("fa:language", ["en", "zh"], "zh");
        const theme = readStoredValue("fa:theme", ["system", "light", "dark"], "system");
        const color = readStoredValue(
          "fa:color",
          ["white", "blue", "mint", "sunset", "graphite"],
          "white",
        );
        const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
        const resolvedTheme = theme === "system" ? (prefersLight ? "light" : "dark") : theme;

        html.lang = language === "zh" ? "zh-CN" : "en";
        html.dataset.theme = resolvedTheme;
        html.dataset.accent = color;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
