services:
  focus-agent:
    image: ${FOCUS_AGENT_IMAGE:?Set FOCUS_AGENT_IMAGE to a published focus-agent image}
    ports:
      - "${FOCUS_AGENT_PUBLISHED_PORT:-8000}:8000"
    environment:
      API_HOST: "0.0.0.0"
      API_PORT: "8000"
      API_RELOAD: "0"
      APP_ENVIRONMENT: ${FOCUS_AGENT_APP_ENVIRONMENT:-production}
      WEB_APP_DEV_SERVER_URL: ""
      MODEL: ${FOCUS_AGENT_MODEL:-}
      HELPER_MODEL: ${FOCUS_AGENT_HELPER_MODEL:-}
      AUTH_ENABLED: ${FOCUS_AGENT_AUTH_ENABLED:-true}
      AUTH_DEMO_TOKENS_ENABLED: ${FOCUS_AGENT_AUTH_DEMO_TOKENS_ENABLED:-false}
      AUTH_JWT_SECRET: ${FOCUS_AGENT_AUTH_JWT_SECRET:?Set FOCUS_AGENT_AUTH_JWT_SECRET}
      AUTH_JWT_ISSUER: ${FOCUS_AGENT_AUTH_JWT_ISSUER:-focus-agent}
      AUTH_JWT_AUDIENCE: ${FOCUS_AGENT_AUTH_JWT_AUDIENCE:-}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${FOCUS_AGENT_AUTH_ACCESS_TOKEN_TTL_SECONDS:-3600}
      CORS_ALLOWED_ORIGINS: ${FOCUS_AGENT_CORS_ALLOWED_ORIGINS:-}
      RATE_LIMIT_ENABLED: ${FOCUS_AGENT_RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_PER_MINUTE: ${FOCUS_AGENT_RATE_LIMIT_PER_MINUTE:-60}
      RATE_LIMIT_CHAT_PER_MINUTE: ${FOCUS_AGENT_RATE_LIMIT_CHAT_PER_MINUTE:-20}
      LANGSMITH_TRACING: ${FOCUS_AGENT_LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${FOCUS_AGENT_LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${FOCUS_AGENT_LANGSMITH_PROJECT:-focus-agent}
      DATABASE_URI: ${FOCUS_AGENT_DATABASE_URI:?Set FOCUS_AGENT_DATABASE_URI}
      ANTHROPIC_API_KEY:
      OPENAI_BASE_URL:
      OPENAI_API_KEY:
      MOONSHOT_BASE_URL:
      MOONSHOT_API_KEY:
      OLLAMA_BASE_URL:
      OLLAMA_API_KEY:
      TAVILY_API_KEY:
    volumes:
      - ${FOCUS_AGENT_DATA_MOUNT:-focus_agent_data}:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import os, urllib.request; urllib.request.urlopen(f\"http://127.0.0.1:{os.environ.get('API_PORT', '8000')}/healthz\", timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  focus_agent_data:
