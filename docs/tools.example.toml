[current_utc_time]
enabled = true
label = "Current UTC Time"
description = "Return the current UTC timestamp in ISO-8601 format."

[write_text_artifact]
enabled = true
label = "Write Text Artifact"
description = "Write a text artifact to disk and return its location."

[artifact_list]
enabled = true
label = "Artifact List"
description = "List text artifacts saved in the configured artifact directory."
default_max_results = 50
max_results_cap = 200

[artifact_read]
enabled = true
label = "Artifact Read"
description = "Read a saved text artifact by filename or artifact id."
max_chars = 50000

[artifact_update]
enabled = true
label = "Artifact Update"
description = "Replace, append to, or prepend content in an existing text artifact."

[list_files]
enabled = true
label = "List Files"
description = "List workspace files under a directory using a glob-like pattern."
default_max_results = 200
max_results_cap = 500

[read_file]
enabled = true
label = "Read File"
description = "Read a UTF-8 text file from the workspace with line numbers."
default_end_line = 200
max_lines = 400
max_chars = 50000

[search_code]
enabled = true
label = "Search Code"
description = "Search for matching text in workspace files and return matching lines."
default_max_results = 30
max_results_cap = 100

[codebase_stats]
enabled = true
label = "Codebase Stats"
description = "Summarize file counts and line counts for the current workspace."
default_max_files = 5000
max_files_cap = 10000

[git_status]
enabled = true
label = "Git Status"
description = "Inspect the current repository status from the workspace root."

[git_diff]
enabled = true
label = "Git Diff"
description = "Return a git diff for the workspace, optionally narrowed to one path."
default_context_lines = 3
max_context_lines = 20
max_diff_chars = 20000

[git_log]
enabled = true
label = "Git Log"
description = "Return recent commits from the current repository."
default_limit = 10
max_limit = 50

[web_fetch]
enabled = true
label = "Web Fetch"
description = "Fetch and extract readable text from a user-provided HTTP or HTTPS URL."
default_max_chars = 12000
max_chars_cap = 50000

[memory_save]
enabled = true
label = "Memory Save"
description = "Save an explicit durable memory such as a user preference or project fact."

[memory_search]
enabled = true
label = "Memory Search"
description = "Search durable memories by query across the default memory namespaces."
default_limit = 5
max_limit = 20

[memory_forget]
enabled = true
label = "Memory Forget"
description = "Delete a saved memory by id from an explicit or default memory namespace."

[conversation_summary]
enabled = true
label = "Conversation Summary"
description = "Return the latest saved rolling summary and recent messages for a thread."
default_recent_messages = 8
max_recent_messages = 30

[skills_list]
enabled = true
label = "Skills List"
description = "List bundled and local skills with their descriptions and trigger prefixes."

[skill_view]
enabled = true
label = "Skill View"
description = "Load the full instructions for a named skill."

[web_search]
enabled = true
label = "Web Search"
description = "Search the live web with Tavily first and DuckDuckGo as a fallback."
provider = "tavily"
fallback_provider = "duckduckgo"
api_key_env = "TAVILY_API_KEY"
