name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: uv pip install --system -e '.[openai,dev]'

      - name: Run Ruff
        run: ruff check .

      - name: Run pytest
        run: pytest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend SDK dependencies
        working-directory: frontend-sdk
        run: npm install

      - name: Type-check frontend SDK
        working-directory: frontend-sdk
        run: npm run check

      - name: Build frontend SDK
        working-directory: frontend-sdk
        run: npm run build
